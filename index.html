<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>지구본 라디오 · 작은앱공방</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0a0b10">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" href="icons/icon-32.png">
<style>
:root{--bg:#0a0b10;--surface:#161621;--card:#1e2132;--border:#2a2d3f;
--accent:#ff0055;--accent2:#ff3370;--text:#fff;--sub:#94a3b8;--muted:#64748b}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;
display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{padding:13px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo{font-size:19px;font-weight:700}.logo .a{color:var(--accent)}
.brand{font-size:11px;color:var(--muted)}
#search{margin-left:auto;background:var(--surface);border:1px solid var(--border);color:var(--text);
border-radius:20px;padding:9px 16px;width:min(320px,42vw);font-size:13px;outline:none}
#search:focus{border-color:var(--accent)}
/* 취침 타이머 */
#timerSel{margin-left:9px;background:var(--surface);border:1px solid var(--border);color:var(--sub);
border-radius:20px;padding:8px 10px;font-size:12px;font-family:inherit;cursor:pointer;outline:none}
#timerSel.on{color:var(--accent2);border-color:var(--accent)}
#timerLeft{margin-left:8px;font-size:12.5px;color:var(--accent2);font-variant-numeric:tabular-nums}
.over{position:fixed;inset:0;z-index:99;background:rgba(10,11,16,.96);display:flex;flex-direction:column;
align-items:center;justify-content:center;gap:15px;text-align:center;padding:24px}
.over h2{font-size:21px}
.over p{font-size:13px;color:var(--sub);line-height:1.7}
.over .row{display:flex;gap:8px}
.main{flex:1;display:flex;min-height:0}
.side{width:210px;border-right:1px solid var(--border);overflow-y:auto;padding:8px;flex-shrink:0}
.tab{display:flex;gap:4px;padding:4px 6px 8px}
.tab button{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--sub);
border-radius:7px;padding:6px 0;font-size:12px;cursor:pointer}
.tab button.on{background:var(--card);color:var(--text);border-color:var(--accent)}
.lab{padding:7px 11px;border-radius:7px;cursor:pointer;font-size:13.5px;display:flex;justify-content:space-between;color:var(--sub)}
.lab:hover{background:var(--surface);color:var(--text)}
.lab.on{background:var(--card);color:var(--text);border-left:3px solid var(--accent)}
.lab .c{color:var(--muted);font-size:12px}
.content{flex:1;overflow-y:auto;padding:18px 24px}
.h{font-size:21px;font-weight:700}.hs{font-size:13px;color:var(--sub);margin-bottom:14px}
.item{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--border);
border-radius:11px;padding:11px 13px;margin-bottom:8px;cursor:pointer;transition:.12s}
.item:hover{border-color:var(--accent)}
.item.playing{border-color:var(--accent);background:#241826}
.play{width:32px;height:32px;border-radius:50%;background:var(--accent);flex-shrink:0;display:flex;
align-items:center;justify-content:center;color:#fff;font-size:12px}
.item.audio .play{background:var(--muted)}
.item .d{font-size:11.5px;color:var(--accent2);font-weight:600}
.item .t{font-size:14px;line-height:1.35}
.item .tag{font-size:11px;color:var(--muted);margin-top:2px}
.item .prog{height:3px;background:#2a2d3f;border-radius:2px;margin-top:5px;max-width:260px}
.item .prog span{display:block;height:100%;background:var(--accent);border-radius:2px}
.bar{flex-shrink:0;border-top:1px solid var(--border);background:var(--surface);
display:flex;align-items:center;gap:13px;padding:9px 16px;min-height:60px}
#ytframe{border-radius:7px;background:#000;flex-shrink:0}
.now{flex:1;min-width:0}.now .t{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.now .m{font-size:12px;color:var(--sub)}.now .idle{color:var(--muted)}
.next{background:var(--card);border:1px solid var(--border);color:var(--sub);border-radius:16px;
padding:7px 13px;font-size:12px;cursor:pointer;white-space:nowrap}.next:hover{color:var(--text);border-color:var(--accent)}
/* 정렬·필터 툴바 */
.toolbar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin:0 0 13px}
.toolbar select,.chip{background:var(--surface);border:1px solid var(--border);color:var(--sub);
border-radius:7px;padding:5px 11px;font-size:12px;cursor:pointer;font-family:inherit;outline:none}
.chip:hover,.toolbar select:hover{color:var(--text)}
.chip.on{background:var(--card);color:var(--text);border-color:var(--accent)}
/* 시청 표시 */
.item.seen{opacity:.5}
.item.seen .play{background:var(--muted)}
.item.seen.playing{opacity:1}
/* 나중에 보기 별 */
.item>div:nth-child(2){min-width:0}
.star{margin-left:auto;flex-shrink:0;background:none;border:0;color:var(--muted);
font-size:17px;line-height:1;padding:4px 5px;cursor:pointer}
.star:hover{color:var(--text)}
.star.on{color:var(--accent2)}
.tab button.later{flex:0 0 auto;padding:6px 9px}
.empty{color:var(--muted);font-size:13px;padding:22px 2px;line-height:1.6}
/* ── 모바일 전용 (데스크톱 레이아웃은 위 규칙 그대로) ───────────────── */
@media(max-width:640px){
/* 헤더 한 줄 유지: 로고는 줄바꿈 금지, 브랜드 배지는 숨김 */
body{height:100dvh}
header{padding:10px 13px;gap:8px;padding-top:calc(10px + env(safe-area-inset-top))}
/* 로고는 절대 줄바꿈·축소하지 않는다. 폭이 모자라면 검색창이 먼저 줄어든다. */
.logo{font-size:16.5px;white-space:nowrap;flex-shrink:0}
.brand{display:none}
#search{margin-left:auto;flex:1 1 0;min-width:52px;width:auto;padding:7px 10px;font-size:12px}
#timerSel{margin-left:0;padding:6px 3px;font-size:10.5px;flex-shrink:0;width:84px;text-overflow:ellipsis}
#timerLeft{margin-left:5px;font-size:11px}
/* 사이드바를 좁혀 목록 폭을 확보 */
.side{width:130px;padding:6px 4px}
.tab{gap:3px;padding:3px 3px 6px}
.tab button{padding:5px 0;font-size:11px;white-space:nowrap}
.tab button.later{padding:5px 7px}
.lab{padding:6px 8px;font-size:12.5px}
.lab .c{font-size:11px}
/* 목록: 카드를 낮춰 한 화면에 더 많이 */
.content{padding:13px 12px}
.h{font-size:18px}.hs{font-size:12px;margin-bottom:11px}
.toolbar{gap:5px;margin-bottom:11px}
.toolbar select,.chip{padding:4px 9px;font-size:11.5px}
.item{gap:9px;padding:9px 10px;border-radius:9px;margin-bottom:7px}
.play{width:27px;height:27px;font-size:11px}
.item .d{font-size:10.5px}
.item .t{font-size:13px;line-height:1.3}
.item .tag{font-size:10.5px}
.star{font-size:16px;padding:3px}
/* 하단 재생바: 유튜브 화면을 줄이고 곡 정보에 폭을 넘김 */
#ytframe{width:96px;height:54px}
.bar{gap:10px;padding:7px 12px;min-height:54px;padding-bottom:calc(7px + env(safe-area-inset-bottom))}
.now .t{font-size:13px}
.now .m{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.next{padding:6px 11px;font-size:11.5px}
}
/* 아주 좁은 기기 */
@media(max-width:380px){
.side{width:112px}
.lab{font-size:11.5px;padding:6px 7px}
#ytframe{width:84px;height:47px}
}
</style></head><body>

</div>

  if(cl)cl.onclick=()=>{if(confirm("나중에 보기 목록을 비울까요?")){later.clear();saveSet(LS.later,later);render();}};
  if(!list.length){const e=document.createElement("div");e.className="empty";
    e.textContent=view==="later"?"저장된 편이 없습니다. 목록에서 ☆ 를 눌러 담아두세요."
      :hideSeen&&total?"이 목록은 전부 들으셨습니다. ‘안 본 편만’을 끄면 다시 보입니다.":"표시할 편이 없습니다.";
    c.appendChild(e);return;}
  const frag=document.createDocumentFragment();
  list.forEach((d,i)=>{const k=keyOf(d),isSeen=seen.has(k),isLater=later.has(k);
    const el=document.createElement("div");
    el.className="item"+(d.k==="audio"?" audio":"")+(isSeen?" seen":"")+(k===curKey?" playing":"");
    el.dataset.k=k;
    el.innerHTML=`<div class="play">${isSeen?"✓":"▶"}</div><div><div class="d">${esc(d.d||"날짜미상")}</div>
      <div class="t">${esc(d.t)}</div><div class="tag">${esc(d.b)} · ${esc(d.l)}</div>
      ${posMap[k]&&posMap[k].d?`<div class="prog"><span style="width:${Math.min(100,Math.round(posMap[k].p/posMap[k].d*100))}%"></span></div>`:""}</div>
      <button class="star${isLater?" on":""}" title="나중에 보기">${isLater?"★":"☆"}</button>`;
    el.onclick=()=>playItem(d,list,i,el);
    el.querySelector(".star").onclick=ev=>{ev.stopPropagation();toggleLater(d,ev.currentTarget);};
    frag.appendChild(el);});
  c.appendChild(frag);
}
// 본 기록은 지우는 기능을 두지 않는다.
function toggleLater(d,btn){const k=keyOf(d);
  if(later.has(k))later.delete(k);else later.add(k);
  saveSet(LS.later,later);
  if(view==="later"){render();return;}
  const on=later.has(k);btn.className="star"+(on?" on":"");btn.textContent=on?"★":"☆";
}
/* 잠금화면·이어폰 버튼 제어. mp3 등 실제 오디오 파일 재생 시 동작하며,
   이 경로라야 화면을 꺼도 소리가 이어진다(유튜브 임베드는 브라우저가 멈춘다). */
function setMediaSession(d){
  if(!("mediaSession" in navigator))return;
  try{
    navigator.mediaSession.metadata=new MediaMetadata({title:d.t,artist:d.l,album:"지구본 라디오"});
    navigator.mediaSession.setActionHandler("nexttrack",playNext);
  }catch(e){}
}
/* 표시용 시간 포맷 */
function fmtPos(sec){const s=Math.floor(sec);
  return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}

/* ── 이어듣기: 재생 위치 저장 ─────────────────────────────────────── */
let posMap={};try{posMap=JSON.parse(localStorage.getItem(LS.pos)||"{}");}catch(e){}
let posT=null;
function getPos(k){return posMap[k]?posMap[k].p:0;}
function setPos(k,p,dur){
  if(!k||!isFinite(p)||p<5)return;
  posMap[k]={p:Math.floor(p),d:Math.floor(dur||0)};
  if(posT)return;
  posT=setTimeout(()=>{posT=null;try{localStorage.setItem(LS.pos,JSON.stringify(posMap));}catch(e){}},3000);
}
function clearPos(k){delete posMap[k];try{localStorage.setItem(LS.pos,JSON.stringify(posMap));}catch(e){}}
A.ontimeupdate=()=>{if(curKey&&A.duration)setPos(curKey,A.currentTime,A.duration);};
A.onended=()=>{if(curKey)clearPos(curKey);playNext();};
setInterval(()=>{try{
  if(ytReady&&curKey&&player.getPlayerState&&player.getPlayerState()===1)
    setPos(curKey,player.getCurrentTime(),player.getDuration());
}catch(e){}},5000);

/* ── 재생 ─────────────────────────────────────────────────────────── */
function playYT(d,nowM){
  A.pause();A.removeAttribute("src");
  if(!d.y){if(nowM)nowM.textContent="재생할 수 있는 영상이 없습니다";return;}
  const k=keyOf(d),pos=getPos(k),dur=posMap[k]?posMap[k].d:0;
  const start=(pos>15&&(!dur||pos<dur-20))?pos:0;
  if(ytReady)player.loadVideoById({videoId:d.y,startSeconds:start});
  else pending={videoId:d.y,startSeconds:start};
  if(nowM&&start)nowM.textContent=(d.d||"")+" · "+d.l+" · "+fmtPos(start)+"부터 이어듣기";
}
function playItem(d,list,idx,el){
  queue=list;qidx=idx;curKey=keyOf(d);
  setMediaSession(d);
  if(!seen.has(curKey)){seen.add(curKey);saveSet(LS.seen,seen);
    if(el){el.classList.add("seen");el.querySelector(".play").textContent="✓";}}
  document.querySelectorAll(".item.playing").forEach(e=>e.classList.remove("playing"));
  if(el)el.classList.add("playing");
  const nowT=document.getElementById("nowT"),nowM=document.getElementById("nowM");
  nowT.className="t";nowT.textContent=d.t;
  nowM.textContent=(d.d||"")+" · "+d.l;
  playYT(d,nowM);
}
// 큐와 화면 목록이 다를 수 있으므로 인덱스가 아니라 키로 엘리먼트를 찾는다.
function playNext(){
  if(qidx<0||qidx+1>=queue.length){document.getElementById("nowM").textContent="마지막 편입니다";return;}
  const d=queue[qidx+1],k=keyOf(d);
  const el=[...document.querySelectorAll(".item")].find(e=>e.dataset.k===k)||null;
  playItem(d,queue,qidx+1,el);
  if(el)el.scrollIntoView({block:"nearest"});
}
/* ── 취침 타이머: 시간이 되면 재생을 멈추고 앱을 닫는다 ─────────────── */
let timerEnd=0,timerTick=null,timerAlarm=null;
function fmtLeft(ms){const s=Math.max(0,Math.round(ms/1000)),p=n=>String(n).padStart(2,"0");
  return p(Math.floor(s/3600))+":"+p(Math.floor(s%3600/60))+":"+p(s%60);}
function setTimer(min){
  clearInterval(timerTick);clearTimeout(timerAlarm);timerTick=timerAlarm=null;
  const sel=document.getElementById("timerSel"),lab=document.getElementById("timerLeft");
  if(!min){timerEnd=0;sel.className="";sel.value="0";lab.textContent="";return;}
  timerEnd=Date.now()+min*60000;sel.className="on";
  const tick=()=>{const left=timerEnd-Date.now();
    if(left<=0){setTimer(0);shutdown();return;}
    lab.textContent=fmtLeft(left);};
  tick();
  timerTick=setInterval(tick,1000);
  // 백그라운드 탭에서는 interval이 느려지므로 정확한 시각에 한 번 더 깨운다.
  timerAlarm=setTimeout(tick,min*60000+300);
}
function shutdown(){
  try{A.pause();A.removeAttribute("src");}catch(e){}
  try{if(ytReady&&player&&player.stopVideo)player.stopVideo();}catch(e){}
  pending=null;queue=[];qidx=-1;curKey=null;
  document.getElementById("nowT").className="t idle";
  document.getElementById("nowT").textContent="타이머 종료 — 재생을 멈췄습니다";
  document.getElementById("nowM").textContent="";
  if(document.querySelector(".over"))return;
  const o=document.createElement("div");o.className="over";
  o.innerHTML=`<h2>⏱ 타이머 종료</h2>
    <p>재생을 멈췄습니다. 잠시 후 창을 닫습니다.<br>자동으로 닫히지 않으면 직접 닫아주세요.</p>
    <div class="row"><button class="chip" id="ovClose">지금 닫기</button><button class="chip" id="ovStay">계속 듣기</button></div>`;
  document.body.appendChild(o);
  o.querySelector("#ovClose").onclick=closeApp;
  o.querySelector("#ovStay").onclick=()=>o.remove();
  setTimeout(closeApp,2000);
}
// 스크립트가 연 창이 아니면 close()가 막힌다. 그때는 안내 화면이 그대로 남는다.
function closeApp(){try{window.close();}catch(e){}}
document.getElementById("timerSel").onchange=e=>setTimer(+e.target.value);
// 눈에 띄는 버튼 대신: 재생 중인 음표를 누르거나 곡 정보를 두 번 누르면 다시 가져오기
// 크게 보기 → 이 상태에서 홈으로 나가면 크롬이 작은 창(PiP)으로 내려준다.
document.getElementById("fsBtn").onclick=()=>{
  const f=document.querySelector("#ytframe")||document.getElementById("ytframe");
  const go=f.requestFullscreen||f.webkitRequestFullscreen||f.webkitEnterFullscreen;
  if(go)try{go.call(f);}catch(e){}
};
document.getElementById("nextBtn").onclick=playNext;
let tm;document.getElementById("search").oninput=e=>{clearTimeout(tm);tm=setTimeout(()=>{curSearch=e.target.value.trim();if(curSearch)view="normal";render();},180);};
render();
// 브라우저가 저장소를 임의로 비우지 못하게 요청 (본 기록 보호)
if(navigator.storage&&navigator.storage.persist)navigator.storage.persist().catch(()=>{});
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script></body></html>
